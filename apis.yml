aid: ellevest
name: Ellevest
description: >-
  Ellevest is a women-founded, women-led wealth management and financial
  planning firm dedicated to closing the gender wealth gap. The platform
  delivers personalized investment management and comprehensive financial
  planning for high-net-worth individuals, families, and institutions,
  with services including portfolio management, retirement and estate
  planning, tax strategy, and cash flow analysis. Ellevest leverages
  REST-based internal APIs for portfolio management, financial coaching,
  banking operations, and personalized investment goal tracking, with
  third-party account connectivity available through Open Banking
  aggregators such as Plaid.
